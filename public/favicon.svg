<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#111315" />
  
  <!-- Outer Tactical Border -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#5B7053" stroke-width="6" stroke-dasharray="16 12" opacity="0.4" />
  
  <!-- Corner Brackets [ ] -->
  <path d="M 64 128 L 64 64 L 128 64" fill="none" stroke="#5B7053" stroke-width="12" stroke-linecap="square" />
  <path d="M 448 128 L 448 64 L 384 64" fill="none" stroke="#5B7053" stroke-width="12" stroke-linecap="square" />
  <path d="M 64 384 L 64 448 L 128 448" fill="none" stroke="#5B7053" stroke-width="12" stroke-linecap="square" />
  <path d="M 448 384 L 448 448 L 384 448" fill="none" stroke="#5B7053" stroke-width="12" stroke-linecap="square" />
  
  <!-- Shield Geometry -->
  <path d="M 256 120 C 310 120 370 100 370 100 C 370 100 380 260 330 350 C 290 420 256 440 256 440 C 256 440 222 420 182 350 C 132 260 142 100 142 100 C 142 100 202 120 256 120 Z" 
        fill="none" stroke="#5B7053" stroke-width="14" stroke-linejoin="round" />

  <!-- Tactical Reticle / Crosshair -->
  <!-- Target Circles -->
  <circle cx="256" cy="245" r="70" fill="none" stroke="#5B7053" stroke-width="8" />
  <circle cx="256" cy="245" r="30" fill="none" stroke="#5B7053" stroke-width="4" stroke-dasharray="6 4" />
  <circle cx="256" cy="245" r="6" fill="#5B7053" />
  
  <!-- Crosshair hairs -->
  <line x1="256" y1="145" x2="256" y2="215" stroke="#5B7053" stroke-width="6" stroke-linecap="round" />
  <line x1="256" y1="275" x2="256" y2="345" stroke="#5B7053" stroke-width="6" stroke-linecap="round" />
  <line x1="156" y1="245" x2="226" y2="245" stroke="#5B7053" stroke-width="6" stroke-linecap="round" />
  <line x1="286" y1="245" x2="356" y2="245" stroke="#5B7053" stroke-width="6" stroke-linecap="round" />
  
  <!-- Outer crosshair tick notches -->
  <path d="M 240 145 L 272 145" stroke="#5B7053" stroke-width="4" />
  <path d="M 240 345 L 272 345" stroke="#5B7053" stroke-width="4" />
  <path d="M 156 229 L 156 261" stroke="#5B7053" stroke-width="4" />
  <path d="M 356 229 L 356 261" stroke="#5B7053" stroke-width="4" />

  <!-- Accent indicator dot (Upper Right) -->
  <circle cx="360" cy="150" r="10" fill="#F57C00" />
</svg>